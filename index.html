<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ROFriends SocialHub</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg,#0f172a,#111827,#1e293b);
      color:white;
      min-height:100vh;
      overflow:hidden;
    }

    .background-glow{
      position:absolute;
      width:500px;
      height:500px;
      background:#00b7ff;
      filter:blur(120px);
      opacity:0.15;
      top:-100px;
      right:-100px;
      border-radius:50%;
    }

    .container{
      position:relative;
      z-index:2;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .card{
      width:420px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.1);
      backdrop-filter:blur(14px);
      border-radius:24px;
      padding:40px;
      text-align:center;
      box-shadow:0 10px 40px rgba(0,0,0,0.4);
    }

    .logo{
      width:90px;
      height:90px;
      margin:auto;
      margin-bottom:20px;
      border-radius:20px;
      background:linear-gradient(135deg,#00c6ff,#0072ff);
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:36px;
      font-weight:bold;
      box-shadow:0 0 25px rgba(0,183,255,0.5);
    }

    h1{
      font-size:34px;
      margin-bottom:10px;
    }

    .ronin{
      color:#00b7ff;
    }

    p{
      color:#cbd5e1;
      font-size:15px;
      margin-bottom:30px;
      line-height:1.6;
    }

    .wallet-btn{
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      background:linear-gradient(135deg,#009dff,#005eff);
      color:white;
      font-size:17px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 5px 20px rgba(0,123,255,0.35);
    }

    .wallet-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 10px 30px rgba(0,123,255,0.5);
    }

    .wallet-address{
      margin-top:20px;
      font-size:14px;
      color:#38bdf8;
      word-break:break-all;
    }

    .footer{
      margin-top:30px;
      font-size:12px;
      color:#94a3b8;
    }
  </style>
</head>

<body>

<div class="background-glow"></div>

<div class="container">
  <div class="card">

    <div class="logo">
      R
    </div>

    <h1>ROFriends <span class="ronin">SocialHub</span></h1>

    <p>
      Connect your Ronin Wallet and enter the next generation
      social platform for the Ronin Network community.
    </p>

    <button class="wallet-btn" onclick="connectRoninWallet()">
      Sign in using Ronin Wallet
    </button>

    <div class="wallet-address" id="walletAddress"></div>

    <div class="footer">
      Powered by Ronin Network
    </div>

  </div>
</div>

<script>
async function connectRoninWallet() {

  if (window.ronin) {

    try {

      const accounts = await window.ronin.request({
        method: "eth_requestAccounts"
      });

      const wallet = accounts[0];

      document.getElementById("walletAddress").innerHTML =
        "Connected Wallet:<br>" + wallet;

    } catch (error) {

      console.error(error);

      alert("Connection rejected.");

    }

  } else {

    alert("Ronin Wallet not detected. Please install Ronin Wallet extension.");

    window.open("https://wallet.roninchain.com/", "_blank");

  }
}
</script>

</body>
</html>
