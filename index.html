<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>rofriends SocialHub</title>
  
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="background-glow"></div>

<div class="container">
  <div class="card">

    <div class="logo">R</div>

    <h1>ROFriends <span class="ronin">SocialHub</span></h1>

    <p>
      Connect your Ronin Wallet and enter the next generation<br>
      social platform for the Ronin Network community.
    </p>

    <button class="wallet-btn" id="connectBtn">
      Sign in using Ronin Wallet
    </button>

    <div class="wallet-address" id="walletAddress" style="display:none;"></div>

    <button class="disconnect-btn" id="disconnectBtn" style="display:none;">
      Disconnect Wallet
    </button>

    <div class="footer">
      Powered by Ronin Network
    </div>

  </div>
</div>

<script src="app.js"></script>

</body>
</html>
