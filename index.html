<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8" /> <title>Ronin Wallet Connect</title> <style> body { font-family: Arial, sans-serif; background: #1f1f24; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; } button { padding: 12px 20px; font-size: 16px; background: #00ffa3; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; } button:hover { background: #00d48a; } #wallet { margin-top: 20px; word-break: break-all; } </style> </head> <body> <h1>Ronin Wallet Login</h1> <button id="connectBtn">Connect Ronin Wallet</button> <p id="wallet">Not connected</p> <script> const connectBtn = document.getElementById("connectBtn"); const walletText = document.getElementById("wallet"); async function connectRonin() { try { // Check if Ronin Wallet is installed if (!window.ronin || !window.ronin.provider) { alert("Ronin Wallet not found. Please install it."); return; } // Request accounts const accounts = await window.ronin.provider.request({ method: "eth_requestAccounts" }); const walletAddress = accounts[0]; walletText.innerText = "Connected: " + walletAddress; console.log("Wallet connected:", walletAddress); } catch (err) { console.error(err); walletText.innerText = "Connection failed"; } } connectBtn.addEventListener("click", connectRonin); </script> </body> </html>
