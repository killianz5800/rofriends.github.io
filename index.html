<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ronin Login - ethers v6</title>
  <!-- ethers v6 via CDN (for quick testing) -->
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.5/dist/ethers.umd.min.js"></script>
</head>
<body>
  <button id="login">Login with Ronin</button>
  <p id="status"></p>

  <script>
    const status = document.getElementById("status");

    document.getElementById("login").onclick = async () => {
      try {
        // Check if Ronin Wallet is installed
        if (!window.ronin?.provider) {
          alert("Ronin Wallet is not installed. Please install it.");
          window.open("https://wallet.roninchain.com", "_blank");
          return;
        }

        status.innerText = "Connecting to Ronin Wallet...";

        // Create BrowserProvider with Ronin provider
        const provider = new ethers.BrowserProvider(window.ronin.provider);

        // Request accounts
        const accounts = await provider.send("eth_requestAccounts", []);
        const address = accounts[0];

        status.innerText = `Connected: ${address.slice(0, 6)}...${address.slice(-4)}`;

        // 1. Get nonce from your backend
        const nonceRes = await fetch("YOUR_SUPABASE_FUNCTION_URL", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            action: "get_nonce",
            address
          })
        });

        const { nonce } = await nonceRes.json();

        const message = `Login to Rofriends with nonce: ${nonce}`;

        // 2. Sign message using ethers v6
        const signer = await provider.getSigner();
        const signature = await signer.signMessage(message);

        status.innerText = "Signature created. Verifying...";

        // 3. Send to backend for verification
        const verifyRes = await fetch("YOUR_SUPABASE_FUNCTION_URL", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            action: "verify",
            address,
            signature,
            message
          })
        });

        const result = await verifyRes.json();

        if (result.success) {
          status.innerText = `✅ Successfully logged in as ${address.slice(0, 6)}...${address.slice(-4)}`;
        } else {
          status.innerText = "❌ Login failed";
        }

      } catch (err) {
        console.error(err);
        status.innerText = "❌ Error: " + (err.message || err);
      }
    };
  </script>
</body>
</html>
