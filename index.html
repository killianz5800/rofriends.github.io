<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ronin Login</title>
</head>
<body>
  <button id="login">Login with Ronin</button>
  <p id="status"></p>

  <script>
    const status = document.getElementById("status");

    // Helper to detect Ronin Wallet
    function getRoninProvider() {
      if (window.ronin?.provider) {
        return window.ronin.provider;
      }
      // Fallback for some versions
      if (window.roninWallet) {
        return window.roninWallet;
      }
      return null;
    }

    document.getElementById("login").onclick = async () => {
      try {
        const provider = getRoninProvider();

        if (!provider) {
          alert("Ronin Wallet is not installed. Please install it from https://wallet.roninchain.com");
          window.open("https://wallet.roninchain.com", "_blank");
          return;
        }

        // Request accounts
        const accounts = await provider.request({
          method: "eth_requestAccounts"
        });

        const address = accounts[0];
        status.innerText = `Connected: ${address.slice(0, 6)}...${address.slice(-4)}`;

        // === Your existing backend nonce + sign flow ===
        const nonceRes = await fetch("YOUR_SUPABASE_FUNCTION_URL", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            action: "get_nonce",
            address
          })
        });

        const { nonce } = await nonceRes.json();

        const message = `Login to Rofriends with nonce: ${nonce}`;

        // Sign message
        const signature = await provider.request({
          method: "personal_sign",
          params: [message, address]
        });

        // Verify on backend
        const verifyRes = await fetch("YOUR_SUPABASE_FUNCTION_URL", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            action: "verify",
            address,
            signature,
            message
          })
        });

        const result = await verifyRes.json();

        if (result.success) {
          status.innerText = `✅ Logged in as ${address.slice(0, 6)}...${address.slice(-4)}`;
        } else {
          status.innerText = "❌ Login failed";
        }

      } catch (err) {
        console.error(err);
        status.innerText = "Error logging in: " + (err.message || err);
      }
    };
  </script>
</body>
</html>
