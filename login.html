<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ROFriends SocialHub</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 80px 20px;
      background: linear-gradient(135deg,#0f172a,#111827);
      color: white;
      min-height: 100vh;
      margin: 0;
    }
    h1 {
      margin-bottom: 40px;
      color: #00d4ff;
      font-size: 42px;
    }
    .card {
      max-width: 420px;
      margin: 0 auto;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(14px);
      border-radius: 24px;
      padding: 50px 30px;
    }
    button {
      padding: 18px 50px;
      font-size: 20px;
      background: linear-gradient(45deg, #00bfff, #0099cc);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin: 20px;
      width: 100%;
    }
    button:hover {
      background: linear-gradient(45deg, #0099cc, #0077aa);
      transform: scale(1.03);
    }
    #status {
      margin-top: 30px;
      font-size: 18px;
      min-height: 80px;
    }
    .success { color: #00ff88; }
  </style>
</head>
<body>

  <div class="card">
    <h1>ROFriends</h1>
    <p style="color:#cbd5e1; margin-bottom:30px;">Login with your Ronin Wallet</p>
    
    <button id="roninBtn">🔗 Login with Ronin Wallet</button>
    
    <div id="status"></div>
  </div>

  <script>
    const btn = document.getElementById('roninBtn');
    const status = document.getElementById('status');

    async function connectWithRonin() {
      status.textContent = "Connecting to Ronin Wallet...";

      if (typeof window.ronin === 'undefined' || !window.ronin.provider) {
        status.innerHTML = `
          ❌ Ronin Wallet not found.<br><br>
          <a href="https://wallet.roninchain.com/" target="_blank" style="color:#00d4ff;">
            Download Ronin Wallet
          </a>
        `;
        return;
      }

      try {
        const provider = window.ronin.provider;
        const accounts = await provider.request({ method: 'eth_requestAccounts' });
        const address = accounts[0];

        status.innerHTML = `
          <span class="success">✅ Successfully Connected!</span><br><br>
          <strong>Wallet Address:</strong><br>
          ${address}
        `;

        // Save and redirect to main app
        localStorage.setItem("roninWallet", address);
        setTimeout(() => {
          window.location.href = "index.html";
        }, 1500);

      } catch (error) {
        console.error(error);
        status.textContent = "❌ Connection cancelled or failed.";
      }
    }

    btn.addEventListener('click', connectWithRonin);
  </script>

</body>
</html>
